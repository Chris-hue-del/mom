<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>精美有質感 - 母親節快樂</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Playfair+Display:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 淺色調優雅配色 */
            --bg-center: #FFF6F8; /* 柔和白粉 */
            --bg-edge: #FDE2E9;   /* 淺玫瑰粉 */
            --rose-gold: #D4AF37;
            --deep-rose: #B35471;
            --soft-pink: #F29CB2;
            --text-dark: #6C3042;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at center, var(--bg-center) 0%, var(--bg-edge) 100%);
            font-family: 'Noto Serif TC', serif;
            color: var(--text-dark);
        }

        /* 質感雜訊覆蓋層 */
        .texture-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 10;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.015'/%3E%3C/svg%3E");
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* 位於 Glow 之後，文字之前 */
        }

        .content-container {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            pointer-events: none; /* 確保文字不擋住下方的滑鼠互動 */
        }

        /* CSS 動畫定義 */
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(20px); filter: blur(5px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .eng-title {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: clamp(1.2rem, 3vw, 2rem);
            color: var(--soft-pink);
            margin-bottom: 0.5rem;
            opacity: 0;
            animation: fadeIn 2s ease-out 0.5s forwards;
            letter-spacing: 0.05em;
        }

        .title {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 600;
            letter-spacing: 0.15em;
            margin: 0 0 0 0.15em;
            background: linear-gradient(135deg, var(--deep-rose), #D97893, var(--rose-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 2s ease-out 1.2s forwards;
            filter: drop-shadow(0 4px 10px rgba(179, 84, 113, 0.15));
            text-align: center;
        }

        .subtitle {
            font-size: clamp(1rem, 3vw, 1.5rem);
            font-weight: 400;
            letter-spacing: 0.3em;
            color: var(--text-dark);
            opacity: 0;
            margin-top: 1.5rem;
            transform: translateY(15px);
            animation: fadeUp 2s ease-out 2.2s forwards;
            text-align: center;
        }

        .date-text {
            font-family: 'Playfair Display', serif;
            font-size: 0.9rem;
            color: var(--soft-pink);
            letter-spacing: 0.2em;
            margin-top: 2rem;
            opacity: 0;
            animation: fadeIn 2s ease-out 3.2s forwards;
        }

        /* 溫暖微光背景 */
        .glow {
            position: absolute;
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, rgba(255, 230, 235, 0.7) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 0;
            animation: pulseGlow 8s infinite alternate ease-in-out;
        }

        @keyframes pulseGlow {
            0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="texture-overlay"></div>
    <div class="glow"></div>
    <canvas id="canvas"></canvas>

    <div class="content-container">
        <div class="eng-title">Happy Mother's Day</div>
        <h1 class="title">母親節快樂</h1>
        <p class="subtitle">感謝您無私的愛與奉獻</p>
        <p class="date-text">2026 . 05 . 12</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let particles = [];
        
        // 動態階段控制：'HEART' (大愛心), 'EXPLODE' (分散中), 'BACKGROUND' (背景漂浮)
        let currentState = 'HEART'; 
        
        // 質感配色：包含玫瑰金、不同深淺的粉
        const colorPalette = [
            { light: '#FFFFFF', dark: '#F29CB2', glow: '#FFB6C1' }, // 珍珠粉白
            { light: '#F29CB2', dark: '#E87A9A', glow: '#B35471' }, // 柔粉
            { light: '#FFE4B5', dark: '#D4AF37', glow: '#D4AF37' }  // 玫瑰金
        ];

        let mouse = { x: -1000, y: -1000 };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            // 重新調整大小時重置粒子，避免座標錯亂
            initParticles();
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('mouseout', () => { mouse.x = -1000; mouse.y = -1000; });
        // 觸摸事件支援
        window.addEventListener('touchstart', e => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });
        window.addEventListener('touchmove', e => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });
        window.addEventListener('touchend', () => { mouse.x = -1000; mouse.y = -1000; });

        // 心形數學公式
        function getHeartPoint(t, scale) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            return { x: x * scale, y: y * scale };
        }

        // 繪製高級質感小愛心的函數
        function drawCardioid(ctx, x, y, size, colorObj, opacity) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(size / 10, size / 10); // 基礎大小縮放
            ctx.beginPath();
            
            // 繪製愛心路徑
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(-5, -5, -10, 0, -10, 5);
            ctx.bezierCurveTo(-10, 12, -2, 18, 0, 20);
            ctx.bezierCurveTo(2, 18, 10, 12, 10, 5);
            ctx.bezierCurveTo(10, 0, 5, -5, 0, 0);
            
            ctx.closePath();

            // 建立徑向漸層，營造透亮寶石感
            const gradient = ctx.createRadialGradient(-3, -3, 0, 0, 0, 15);
            gradient.addColorStop(0, hexToRgba(colorObj.light, opacity)); // 亮部
            gradient.addColorStop(0.5, hexToRgba(colorObj.dark, opacity)); // 主色
            gradient.addColorStop(1, hexToRgba(colorObj.dark, opacity * 0.8)); // 邊緣略暗

            ctx.fillStyle = gradient;
            
            // 添加霓虹微光 (Shadow)，增加高級感，但限制模糊半徑以顧及效能
            ctx.shadowColor = hexToRgba(colorObj.glow, opacity * 0.6);
            ctx.shadowBlur = size * 1.5;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;

            ctx.fill();
            ctx.restore();
        }

        // 輔助函數：Hex 轉 RGBA
        function hexToRgba(hex, opacity) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${opacity})`;
        }

        class Particle {
            constructor() {
                // 初始位置在螢幕中心，準備組成大心
                this.x = width / 2 + (Math.random() - 0.5) * 50;
                this.y = height / 2 + (Math.random() - 0.5) * 50;
                
                // 隨機選取配色方案
                this.color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                
                // 大心形時的目標相對座標
                this.heartT = Math.random() * Math.PI * 2;
                this.heartScatter = 0.5 + Math.random() * 0.5; // 讓粒子稍微分散在心形線上

                // 物理屬性
                this.vx = 0;
                this.vy = 0;
                this.friction = 0.96; // 阻尼
                this.speed = Math.random() * 0.02 + 0.01; // 自身漂浮速度變數
                this.angle = Math.random() * Math.PI * 2; // 自身漂浮角度
                
                // 外觀屬性
                this.baseSize = window.innerWidth < 768 ? 2.5 : 4; // 手機版粒子較小
                this.size = this.baseSize * (0.8 + Math.random() * 0.4);
                this.opacity = 0; // 初始透明，慢慢淡入
                this.targetOpacity = 0.6 + Math.random() * 0.4;
                
                // 用於背景漂浮階段的隨機目標變數
                this.bgSpeedX = (Math.random() - 0.5) * 0.3;
                this.bgSpeedY = -0.2 - Math.random() * 0.5; // 主要向上飄
            }

            update(time, heartScale) {
                // 透明度淡入
                if (this.opacity < this.targetOpacity) this.opacity += 0.01;

                if (currentState === 'HEART') {
                    // --- 階段 1: 組成閃爍大愛心 ---
                    const heartPos = getHeartPoint(this.heartT, heartScale * this.heartScatter);
                    const targetX = width / 2 + heartPos.x;
                    const targetY = height / 2 + heartPos.y - (height * 0.05); // 稍微上移

                    // 柔和的跟隨目標 (磁吸感)
                    this.vx += (targetX - this.x) * 0.03;
                    this.vy += (targetY - this.y) * 0.03;
                    
                    // 滑鼠互動 (排斥)
                    let dx = this.x - mouse.x;
                    let dy = this.y - mouse.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 100) {
                        let force = (100 - dist) / 100;
                        this.vx += (dx / dist) * force * 2;
                        this.vy += (dy / dist) * force * 2;
                    }

                    this.vx *= 0.8; // 大心階段阻尼較重，使其穩定
                    this.vy *= 0.8;

                } else if (currentState === 'EXPLODE') {
                    // --- 階段 2: 爆炸分散 (物理運動) ---
                    this.vx *= this.friction;
                    this.vy *= this.friction;
                    
                    // 當速度慢下來，切換到背景漂浮模式
                    if (Math.abs(this.vx) < 0.2 && Math.abs(this.vy) < 0.2) {
                        currentState = 'BACKGROUND';
                    }
                } else if (currentState === 'BACKGROUND') {
                    // --- 階段 3: 高級質感小愛心充滿背景漂浮 ---
                    this.x += this.bgSpeedX + Math.sin(this.angle) * 0.2;
                    this.y += this.bgSpeedY;
                    this.angle += this.speed;

                    // 閃爍效果 (透明度微調)
                    this.opacity = hexToRgba(this.color.dark, 0).includes('NaN') ? 0 : this.targetOpacity * (0.7 + Math.sin(time * 2 + this.heartT) * 0.3);

                    // 邊界檢查：飄出螢幕後從下方/對側重新出現
                    if (this.y < -20) { this.y = height + 20; this.x = Math.random() * width; }
                    if (this.x < -20) this.x = width + 20;
                    if (this.x > width + 20) this.x = -20;
                }

                // 應用速度
                this.x += this.vx;
                this.y += this.vy;
            }

            draw() {
                if (this.opacity <= 0) return;
                // 呼叫繪製質感愛心函數
                drawCardioid(ctx, this.x, this.y, this.size, this.color, this.opacity);
            }

            // 觸發爆炸的方法
            explode() {
                // 給予隨機向外的極高初始速度
                const angle = Math.random() * Math.PI * 2;
                const speed = 10 + Math.random() * 15;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.targetOpacity = 0.4 + Math.random() * 0.4; // 背景模式下稍微淡一點，不搶戲
            }
        }

        function initParticles() {
            particles = [];
            // 為了高級質感繪製較耗效能，控制粒子數量
            // 電腦版約 250 顆，手機版約 120 顆
            const particleCount = window.innerWidth < 768 ? 120 : 250; 
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            // 清除畫布，保持輕微拖影增加柔和感
            ctx.fillStyle = 'rgba(255, 246, 248, 0.3)'; 
            ctx.fillRect(0, 0, width, height);

            const time = Date.now() * 0.001;
            
            // 計算大愛心的呼吸律動 (beat)
            let heartScale = 0;
            if (currentState === 'HEART') {
                // 基礎大小隨螢幕調整
                const baseScale = Math.min(width, height) / 60;
                // 呼吸動畫
                const beatFactor = 1 + Math.pow(Math.abs(Math.sin(time * Math.PI)), 10) * 0.1;
                heartScale = baseScale * beatFactor;
            }

            particles.forEach(p => {
                p.update(time, heartScale);
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        // --- 主流程控制 ---

        // 1. 初始化與開始動畫
        resize();
        animate();

        // 2. 設定定時器：等文字全部出現後觸發分散
        // CSS 動畫最晚的一個是在 3.2s 開始，持續 2s。
        // 我們約在 4.5s ~ 5s 時觸發分散效果最合適。
        setTimeout(() => {
            if (currentState === 'HEART') {
                currentState = 'EXPLODE';
                particles.forEach(p => p.explode());
            }
        }, 4800); // 4.8 秒後大愛心分散

    </script>
</body>
</html>
